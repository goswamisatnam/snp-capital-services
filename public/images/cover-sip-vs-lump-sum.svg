<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-sip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C1B33"/>
      <stop offset="100%" stop-color="#1A8C7A"/>
    </linearGradient>
    <linearGradient id="bar-sip" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#1A8C7A"/>
    </linearGradient>
    <linearGradient id="bar-lump" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bg-sip)"/>

  <!-- Dot grid -->
  <pattern id="dots-sip" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.2" fill="white" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="480" fill="url(#dots-sip)"/>

  <!-- Decorative circles -->
  <circle cx="1120" cy="-40" r="200" fill="white" opacity="0.04"/>
  <circle cx="1050" cy="520" r="180" fill="white" opacity="0.04"/>
  <circle cx="80" cy="420" r="120" fill="white" opacity="0.04"/>

  <!-- Chart area — left side -->
  <!-- Axis lines -->
  <line x1="80" y1="360" x2="500" y2="360" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <line x1="80" y1="290" x2="500" y2="290" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="80" y1="220" x2="500" y2="220" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="80" y1="150" x2="500" y2="150" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="80" y1="150" x2="80" y2="360" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>

  <!-- SIP bars (teal) -->
  <rect x="100" y="310" width="42" height="50" rx="5" fill="url(#bar-sip)" opacity="0.9"/>
  <rect x="185" y="280" width="42" height="80" rx="5" fill="url(#bar-sip)" opacity="0.9"/>
  <rect x="270" y="240" width="42" height="120" rx="5" fill="url(#bar-sip)" opacity="0.9"/>
  <rect x="355" y="195" width="42" height="165" rx="5" fill="url(#bar-sip)" opacity="0.9"/>

  <!-- Lump sum bars (gold) -->
  <rect x="148" y="320" width="32" height="40" rx="4" fill="url(#bar-lump)" opacity="0.85"/>
  <rect x="233" y="295" width="32" height="65" rx="4" fill="url(#bar-lump)" opacity="0.85"/>
  <rect x="318" y="260" width="32" height="100" rx="4" fill="url(#bar-lump)" opacity="0.85"/>
  <rect x="403" y="210" width="32" height="150" rx="4" fill="url(#bar-lump)" opacity="0.85"/>

  <!-- Trend line over bars -->
  <polyline points="121,308 206,276 291,238 376,190 461,140" fill="none" stroke="#5eead4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <circle cx="121" cy="308" r="5" fill="#5eead4"/>
  <circle cx="206" cy="276" r="5" fill="#5eead4"/>
  <circle cx="291" cy="238" r="5" fill="#5eead4"/>
  <circle cx="376" cy="190" r="5" fill="#5eead4"/>
  <circle cx="461" cy="140" r="5" fill="#5eead4"/>

  <!-- Year labels -->
  <text x="116" y="378" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.6" text-anchor="middle">Y1</text>
  <text x="206" y="378" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.6" text-anchor="middle">Y3</text>
  <text x="291" y="378" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.6" text-anchor="middle">Y5</text>
  <text x="376" y="378" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.6" text-anchor="middle">Y10</text>
  <text x="461" y="378" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.6" text-anchor="middle">Y15</text>

  <!-- Right side — Text -->
  <text x="560" y="130" font-family="system-ui, Arial, sans-serif" font-size="54" font-weight="800" fill="white" letter-spacing="-1">SIP vs Lump Sum</text>
  <text x="562" y="185" font-family="system-ui, Arial, sans-serif" font-size="24" fill="white" opacity="0.75">Which strategy wins in India's market?</text>

  <!-- Divider -->
  <rect x="562" y="210" width="80" height="4" rx="2" fill="#5eead4"/>

  <!-- Legend -->
  <rect x="562" y="240" width="18" height="18" rx="4" fill="url(#bar-sip)"/>
  <text x="588" y="254" font-family="system-ui, Arial, sans-serif" font-size="17" fill="white" opacity="0.9">SIP (Monthly)</text>
  <rect x="562" y="272" width="18" height="18" rx="4" fill="url(#bar-lump)"/>
  <text x="588" y="286" font-family="system-ui, Arial, sans-serif" font-size="17" fill="white" opacity="0.9">Lump Sum</text>

  <!-- Key stat -->
  <rect x="562" y="320" width="340" height="80" rx="14" fill="white" opacity="0.08"/>
  <text x="582" y="350" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.6" text-transform="uppercase">15-year Nifty 50 SIP CAGR</text>
  <text x="582" y="385" font-family="system-ui, Arial, sans-serif" font-size="32" font-weight="700" fill="#5eead4">~12.5%</text>

  <!-- Badges -->
  <rect x="562" y="420" width="100" height="32" rx="16" fill="white" opacity="0.12"/>
  <text x="612" y="440" font-family="system-ui, Arial, sans-serif" font-size="14" fill="white" opacity="0.9" text-anchor="middle">Beginner</text>
  <rect x="674" y="420" width="120" height="32" rx="16" fill="white" opacity="0.12"/>
  <text x="734" y="440" font-family="system-ui, Arial, sans-serif" font-size="14" fill="white" opacity="0.9" text-anchor="middle">India Market</text>
</svg>
