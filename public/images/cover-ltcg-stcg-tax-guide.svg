<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-tax" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="bar-ltcg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bar-stcg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#a21caf"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="480" fill="url(#bg-tax)"/>

  <pattern id="dots-tax" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.1" fill="white" opacity="0.09"/>
  </pattern>
  <rect width="1200" height="480" fill="url(#dots-tax)"/>

  <circle cx="1080" cy="-80" r="240" fill="white" opacity="0.04"/>
  <circle cx="60" cy="500" r="150" fill="white" opacity="0.04"/>
  <circle cx="500" cy="240" r="300" fill="white" opacity="0.02"/>

  <!-- Document outline (decorative) -->
  <rect x="60" y="80" width="240" height="300" rx="12" fill="white" opacity="0.05" stroke="white" stroke-opacity="0.12" stroke-width="1.5"/>
  <rect x="80" y="105" width="140" height="12" rx="6" fill="white" opacity="0.15"/>
  <rect x="80" y="128" width="180" height="8" rx="4" fill="white" opacity="0.08"/>
  <rect x="80" y="148" width="160" height="8" rx="4" fill="white" opacity="0.08"/>
  <rect x="80" y="168" width="120" height="8" rx="4" fill="white" opacity="0.08"/>

  <!-- Tax rate bars -->
  <text x="82" y="226" font-family="system-ui, Arial, sans-serif" font-size="11" fill="white" opacity="0.5">LTCG</text>
  <rect x="82" y="232" width="120" height="28" rx="5" fill="url(#bar-ltcg)" opacity="0.9"/>
  <text x="210" y="251" font-family="system-ui, Arial, sans-serif" font-size="16" font-weight="700" fill="#c4b5fd">12.5%</text>

  <text x="82" y="280" font-family="system-ui, Arial, sans-serif" font-size="11" fill="white" opacity="0.5">STCG</text>
  <rect x="82" y="286" width="185" height="28" rx="5" fill="url(#bar-stcg)" opacity="0.9"/>
  <text x="275" y="305" font-family="system-ui, Arial, sans-serif" font-size="16" font-weight="700" fill="#f0abfc">20%</text>

  <!-- Exemption tag -->
  <rect x="82" y="330" width="200" height="36" rx="8" fill="#fde68a" opacity="0.12"/>
  <text x="100" y="353" font-family="system-ui, Arial, sans-serif" font-size="14" fill="#fde68a" opacity="0.9">Exempt: ₹1.25 Lakh / Year</text>

  <!-- Right side text -->
  <text x="360" y="120" font-family="system-ui, Arial, sans-serif" font-size="50" font-weight="800" fill="white" letter-spacing="-1">LTCG &amp; STCG Tax</text>
  <text x="362" y="178" font-family="system-ui, Arial, sans-serif" font-size="50" font-weight="800" fill="white" letter-spacing="-1">on Stocks</text>
  <text x="362" y="226" font-family="system-ui, Arial, sans-serif" font-size="22" fill="white" opacity="0.72">Everything you need to know</text>
  <rect x="362" y="250" width="80" height="4" rx="2" fill="#a78bfa"/>

  <!-- Tax rate cards -->
  <rect x="360" y="278" width="200" height="78" rx="12" fill="white" opacity="0.08"/>
  <text x="378" y="303" font-family="system-ui, Arial, sans-serif" font-size="12" fill="white" opacity="0.55">Long-Term Capital Gain</text>
  <text x="378" y="342" font-family="system-ui, Arial, sans-serif" font-size="34" font-weight="700" fill="#a78bfa">12.5%</text>

  <rect x="576" y="278" width="200" height="78" rx="12" fill="white" opacity="0.08"/>
  <text x="594" y="303" font-family="system-ui, Arial, sans-serif" font-size="12" fill="white" opacity="0.55">Short-Term Capital Gain</text>
  <text x="594" y="342" font-family="system-ui, Arial, sans-serif" font-size="34" font-weight="700" fill="#f0abfc">20%</text>

  <rect x="792" y="278" width="220" height="78" rx="12" fill="#fde68a" opacity="0.10"/>
  <text x="810" y="303" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#fde68a" opacity="0.7">Annual Exemption</text>
  <text x="810" y="342" font-family="system-ui, Arial, sans-serif" font-size="28" font-weight="700" fill="#fde68a">₹1.25 Lakh</text>

  <text x="360" y="396" font-family="system-ui, Arial, sans-serif" font-size="14" fill="white" opacity="0.4">Budget 2024 rates — covers stocks, mutual funds, property, gold</text>

  <rect x="360" y="418" width="130" height="30" rx="15" fill="white" opacity="0.12"/>
  <text x="425" y="437" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.9" text-anchor="middle">Intermediate</text>
  <rect x="502" y="418" width="110" height="30" rx="15" fill="white" opacity="0.12"/>
  <text x="557" y="437" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.9" text-anchor="middle">India Market</text>
</svg>
