<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-opt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b0000"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="curve-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="480" fill="url(#bg-opt)"/>

  <pattern id="dots-opt" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.1" fill="white" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="480" fill="url(#dots-opt)"/>

  <circle cx="1100" cy="-60" r="250" fill="white" opacity="0.03"/>
  <circle cx="60" cy="530" r="180" fill="white" opacity="0.03"/>

  <!-- Axes for option payoff chart -->
  <line x1="60" y1="360" x2="500" y2="360" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>
  <line x1="280" y1="110" x2="280" y2="380" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Option payoff curve (call option shape) -->
  <polyline points="60,360 150,360 200,360 240,360 280,360 310,330 340,296 370,262 400,228 430,194 460,160 500,118"
    fill="none" stroke="url(#curve-grad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Fill under curve -->
  <polygon points="280,360 310,330 340,296 370,262 400,228 430,194 460,160 500,118 500,360"
    fill="#fca5a5" opacity="0.08"/>

  <!-- Strike price label -->
  <line x1="280" y1="355" x2="280" y2="365" stroke="white" stroke-opacity="0.5" stroke-width="2"/>
  <text x="280" y="378" font-family="system-ui, Arial, sans-serif" font-size="12" fill="white" opacity="0.55" text-anchor="middle">Strike Price</text>
  <text x="506" y="364" font-family="system-ui, Arial, sans-serif" font-size="12" fill="white" opacity="0.55">Spot →</text>
  <text x="286" y="108" font-family="system-ui, Arial, sans-serif" font-size="12" fill="white" opacity="0.55">P&amp;L ↑</text>

  <!-- Greek cards on left bottom -->
  <rect x="62" y="160" width="84" height="48" rx="8" fill="white" opacity="0.08"/>
  <text x="104" y="182" font-family="system-ui, Arial, sans-serif" font-size="26" font-weight="700" fill="#fca5a5" text-anchor="middle">Δ</text>
  <text x="104" y="200" font-family="system-ui, Arial, sans-serif" font-size="11" fill="white" opacity="0.55" text-anchor="middle">Delta</text>

  <rect x="157" y="160" width="84" height="48" rx="8" fill="white" opacity="0.08"/>
  <text x="199" y="182" font-family="system-ui, Arial, sans-serif" font-size="26" font-weight="700" fill="#fdba74" text-anchor="middle">Γ</text>
  <text x="199" y="200" font-family="system-ui, Arial, sans-serif" font-size="11" fill="white" opacity="0.55" text-anchor="middle">Gamma</text>

  <rect x="62" y="218" width="84" height="48" rx="8" fill="white" opacity="0.08"/>
  <text x="104" y="240" font-family="system-ui, Arial, sans-serif" font-size="26" font-weight="700" fill="#86efac" text-anchor="middle">Θ</text>
  <text x="104" y="258" font-family="system-ui, Arial, sans-serif" font-size="11" fill="white" opacity="0.55" text-anchor="middle">Theta</text>

  <rect x="157" y="218" width="84" height="48" rx="8" fill="white" opacity="0.08"/>
  <text x="199" y="240" font-family="system-ui, Arial, sans-serif" font-size="26" font-weight="700" fill="#93c5fd" text-anchor="middle">ν</text>
  <text x="199" y="258" font-family="system-ui, Arial, sans-serif" font-size="11" fill="white" opacity="0.55" text-anchor="middle">Vega</text>

  <!-- Right side text -->
  <text x="580" y="115" font-family="system-ui, Arial, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">Understanding</text>
  <text x="580" y="172" font-family="system-ui, Arial, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">Option Greeks</text>
  <text x="582" y="220" font-family="system-ui, Arial, sans-serif" font-size="23" fill="#fca5a5" opacity="0.9" letter-spacing="3">Δ · Γ · Θ · ν</text>
  <rect x="582" y="244" width="80" height="4" rx="2" fill="#fca5a5"/>

  <!-- Greek explanations -->
  <rect x="580" y="268" width="540" height="100" rx="12" fill="white" opacity="0.06"/>
  <text x="600" y="292" font-family="system-ui, Arial, sans-serif" font-size="14" fill="#fca5a5" font-weight="600">Delta (Δ)</text>
  <text x="700" y="292" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.7">Price sensitivity per ₹1 move</text>
  <text x="600" y="315" font-family="system-ui, Arial, sans-serif" font-size="14" fill="#fdba74" font-weight="600">Gamma (Γ)</text>
  <text x="700" y="315" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.7">Rate of change of Delta</text>
  <text x="600" y="338" font-family="system-ui, Arial, sans-serif" font-size="14" fill="#86efac" font-weight="600">Theta (Θ)</text>
  <text x="700" y="338" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.7">Time decay — loses value daily</text>
  <text x="600" y="361" font-family="system-ui, Arial, sans-serif" font-size="14" fill="#93c5fd" font-weight="600">Vega (ν)</text>
  <text x="700" y="361" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.7">Sensitivity to implied volatility</text>

  <text x="580" y="406" font-family="system-ui, Arial, sans-serif" font-size="14" fill="white" opacity="0.4">With real NSE/F&amp;O examples and Python code</text>

  <rect x="580" y="425" width="100" height="30" rx="15" fill="white" opacity="0.12"/>
  <text x="630" y="444" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.9" text-anchor="middle">Advanced</text>
  <rect x="692" y="425" width="110" height="30" rx="15" fill="white" opacity="0.12"/>
  <text x="747" y="444" font-family="system-ui, Arial, sans-serif" font-size="13" fill="white" opacity="0.9" text-anchor="middle">India Market</text>
</svg>
